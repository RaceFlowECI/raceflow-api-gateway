server:
  port: 8080

spring:
  application:
    name: raceflow-api-gateway
  cloud:
    gateway:
      routes: []


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: local

# OpenTelemetry — config fallback para ejecucion local sin Docker
# El agente lee estas propiedades si las env vars OTEL_* no estan definidas
otel:
  service:
    name: ${OTEL_SERVICE_NAME:raceflow-api-gateway}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
