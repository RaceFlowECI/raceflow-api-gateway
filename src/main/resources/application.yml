server:
  port: 8080

spring:
  application:
    name: raceflow-api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /auth/$\{segment}
        - id: realtime-rooms
          uri: ${REALTIME_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/rooms/**
          filters:
            - RewritePath=/api/rooms/(?<segment>.*), /rooms/$\{segment}
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "https://lively-rock-0066b1e0f.7.azurestaticapps.net"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: local

# OpenTelemetry — config fallback para ejecucion local sin Docker
# El agente lee estas propiedades si las env vars OTEL_* no estan definidas
otel:
  service:
    name: ${OTEL_SERVICE_NAME:raceflow-api-gateway}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
